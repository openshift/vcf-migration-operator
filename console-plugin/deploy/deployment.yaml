apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcf-migration-console-plugin
  namespace: openshift-vcf-migration
  labels:
    app: vcf-migration-console-plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vcf-migration-console-plugin
  template:
    metadata:
      labels:
        app: vcf-migration-console-plugin
    spec:
      serviceAccountName: vcf-migration-console-plugin
      containers:
        - name: plugin
          image: vcf-migration-console-plugin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9443
              name: https
          args:
            - --port=9443
            - --tls-cert=/var/serving-cert/tls.crt
            - --tls-key=/var/serving-cert/tls.key
            - --static-dir=/app/dist
          volumeMounts:
            - name: serving-cert
              readOnly: true
              mountPath: /var/serving-cert
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: serving-cert
          secret:
            secretName: vcf-migration-console-plugin-tls
