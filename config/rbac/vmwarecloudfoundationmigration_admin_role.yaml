# This rule is not used by the project vcf-migration-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over migration.openshift.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vcf-migration-operator
    app.kubernetes.io/managed-by: kustomize
  name: vmwarecloudfoundationmigration-admin-role
rules:
- apiGroups:
  - migration.openshift.io
  resources:
  - vmwarecloudfoundationmigrations
  verbs:
  - '*'
- apiGroups:
  - migration.openshift.io
  resources:
  - vmwarecloudfoundationmigrations/status
  verbs:
  - get
