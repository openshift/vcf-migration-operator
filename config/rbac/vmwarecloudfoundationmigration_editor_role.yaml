# This rule is not used by the project vcf-migration-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the migration.openshift.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vcf-migration-operator
    app.kubernetes.io/managed-by: kustomize
  name: vmwarecloudfoundationmigration-editor-role
rules:
- apiGroups:
  - migration.openshift.io
  resources:
  - vmwarecloudfoundationmigrations
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - migration.openshift.io
  resources:
  - vmwarecloudfoundationmigrations/status
  verbs:
  - get
