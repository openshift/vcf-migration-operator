# This rule is not used by the project vcf-migration-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to migration.openshift.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: vcf-migration-operator
    app.kubernetes.io/managed-by: kustomize
  name: vmwarecloudfoundationmigration-viewer-role
rules:
- apiGroups:
  - migration.openshift.io
  resources:
  - vmwarecloudfoundationmigrations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - migration.openshift.io
  resources:
  - vmwarecloudfoundationmigrations/status
  verbs:
  - get
